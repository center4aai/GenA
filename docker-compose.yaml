services:
  agent_api:
    build:
      context: .
      dockerfile: agent_api/Dockerfile
    container_name: ${AGENT_API_CONTAINER_NAME}
    ports:
      - "8790"
    env_file:
      - ./.env
    networks:
      - gena_net
    extra_hosts: 
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - chunker
#      - ruadapt-qwen

  gena_frontend:
    build:
      context: ./gena_frontend
      dockerfile: Dockerfile
      args:
        VITE_DATASET_API_URL: ${VITE_DATASET_API_URL:-/api/dataset}
        VITE_AGENT_API_URL: ${VITE_AGENT_API_URL:-/api/agent}
        VITE_CHUNKER_URL: ${VITE_CHUNKER_URL:-/api/chunker}
    container_name: ${GENA_FRONTEND_CONTAINER_NAME:-gena_frontend}
    ports:
      - "${WEB_PORT:-27371}:443"
    env_file:
      - ./.env
    networks:
      - gena_net
    restart: unless-stopped
    depends_on:
      - dataset_api
      - agent_api
      - chunker

  # Legacy Streamlit UI (optional; use profile streamlit to run alongside SPA)
  gena_web:
    profiles: ["streamlit"]
    build: ./gena_web
    container_name: ${GENA_WEB_CONTAINER_NAME}
    ports:
      - "${STREAMLIT_PORT:-27372}:8516"
    volumes:
      - ./gena_web:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ./.env
    networks:
      - gena_net
    restart: unless-stopped

  dataset_api:
    build: ./dataset_api
    container_name: ${DATASET_API_CONTAINER_NAME}
    ports:
      - "8789"
    env_file:
      - ./.env
    networks:
      - gena_net
    restart: unless-stopped

  task_worker:
    build: ./task_worker
    container_name: ${TASK_WORKER_CONTAINER_NAME}
    env_file:
      - ./.env
    networks:
      - gena_net
    restart: unless-stopped
    depends_on:
      - dataset_api
      - agent_api

  chunker:
    build:
      context: .
      dockerfile: chunker/Dockerfile
    container_name: ${GENA_CHUNKER_CONTAINER_NAME}
    ports:
      - "8517"
    env_file:
      - ./.env
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    runtime: nvidia
    networks:
      - gena_net
    restart: unless-stopped

  # ruadapt-qwen:
  #   image: ghcr.io/ggml-org/llama.cpp:server-cuda
  #   container_name: ${RUADAPT_QWEN_SERVER_CONTAINER_NAME}
  #   restart: unless-stopped
  #   ports:
  #     - "27362:8000"
